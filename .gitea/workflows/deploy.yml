name: deploy

on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "check (dry-run) or apply"
        required: true
        default: "apply"
        type: choice
        options:
          - check
          - apply

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate: only run on successful test workflow OR manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout (only needed for workflow metadata)
        uses: actions/checkout@v4

      - name: Install SSH client + rsync
        run: |
          apt-get update -qq
          apt-get install -y -qq openssh-client rsync

      - name: Configure SSH to ark-srv01
        env:
          SSH_KEY: ${{ secrets.ARK_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.ARK_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull latest code on ark-srv01
        env:
          DEPLOY_HOST: ${{ secrets.ARK_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.ARK_DEPLOY_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          REPO_DIR=/root/ark-cluster-ansible
          REPO_URL=http://10.10.100.8:9001/Homelab/ark-cluster-ansible.git
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone "$REPO_URL" "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          git fetch --prune origin
          git reset --hard origin/main
          # Keep local-only user config present (gitignored, not overwritten by checkout).
          test -f group_vars/gameservers.yml || cp group_vars/gameservers.yml.example group_vars/gameservers.yml
          test -f inventory_remote || cp inventory_remote.example inventory_remote
          REMOTE

      - name: Decide run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=apply" >> "$GITHUB_OUTPUT"
          fi

      - name: ansible-playbook --check --diff (always runs, prints diff)
        env:
          DEPLOY_HOST: ${{ secrets.ARK_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.ARK_DEPLOY_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/ark-cluster-ansible
          ansible-playbook --check --diff -i inventory_remote main.yml
          REMOTE

      - name: ansible-playbook apply
        if: steps.mode.outputs.mode == 'apply'
        env:
          DEPLOY_HOST: ${{ secrets.ARK_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.ARK_DEPLOY_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/ark-cluster-ansible
          ansible-playbook -i inventory_remote main.yml
          REMOTE

      - name: Smoke test — arkmanager status
        if: steps.mode.outputs.mode == 'apply'
        env:
          DEPLOY_HOST: ${{ secrets.ARK_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.ARK_DEPLOY_USER }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          /usr/local/bin/arkmanager status @all || true
          echo "---"
          # Crontab present?
          crontab -u ark -l | head -5
          REMOTE
