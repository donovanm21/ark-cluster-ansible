---
# Top-level play: run in order on the target host.
# Roles are listed explicitly (not via meta/main.yml dependencies) so the
# execution order is visible and each role stays independently runnable.
- name: Deploy ARK cluster
  hosts: gameservers
  connection: local
  become: true

  roles:
    - { role: provision,  tags: ["provision", "bootstrap"] }
    - { role: arkmanager, tags: ["arkmanager", "bootstrap"] }
    - { role: maps,       tags: ["maps", "config"] }
    - { role: system,     tags: ["system", "config"] }
