---
# Convert the two shell scripts that reference other paths into templates so
# they resolve {{ ark_home }} when deployed. (ark_rcon_cmd.sh is copied as-is
# because it has no path-level references.)

- name: Render the mod checker script
  template:
    src: ark_mod_checker.sh.j2
    dest: "{{ ark_home }}/ark_mod_checker.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Render the update checker script
  template:
    src: ark_update_checker.sh.j2
    dest: "{{ ark_home }}/ark_update_checker.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Copy the ark rcon command script (used by cron for wild dino wipes)
  copy:
    src: scripts/ark_rcon_cmd.sh
    dest: "{{ ark_home }}/ark_rcon_cmd.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Render the system update script
  template:
    src: ark_system_update.sh.j2
    dest: "{{ ark_home }}/ark_system_update.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Render the system startup script
  template:
    src: ark_map_start.sh.j2
    dest: "{{ ark_home }}/ark_map_start.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Render the crash-recovery watchdog script
  template:
    src: ark_watchdog.sh.j2
    dest: "{{ ark_home }}/ark_watchdog.sh"
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Render the logrotate config for arkmanager logs
  template:
    src: logrotate_arkmanager.j2
    dest: /etc/logrotate.d/arkmanager
    owner: root
    group: root
    mode: '0644'

- name: Render the crontab file
  template:
    src: crontab.txt.j2
    dest: "{{ ark_home }}/crontab.txt"
    owner: "{{ ark_user }}"
    mode: '0644'
  register: crontab_rendered

- name: Import the crontab when it changed
  command: "crontab -u {{ ark_user }} {{ ark_home }}/crontab.txt"
  when: crontab_rendered.changed
