---
- name: Create the arkmanager files directory
  file:
    path: "{{ arkmanager_config_dir }}/files"
    state: directory
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Create the SaveGames directory
  file:
    path: "{{ ark_server_root }}/ShooterGame/Saved/SaveGames"
    state: directory
    owner: "{{ ark_user }}"
    mode: '0755'

- name: Create the directories for maps
  file:
    path: "{{ arkmanager_config_dir }}/files/{{ item.map_name }}"
    state: directory
    owner: "{{ ark_user }}"
    mode: '0755'
  loop: "{{ maps }}"

- name: Set ark_MultiHome with the default IPv4 address
  set_fact:
    ark_MultiHome: "{{ ansible_default_ipv4.address }}"

- name: Copy map instance file
  template:
    src: instance.cfg.j2
    dest: "{{ arkmanager_config_dir }}/instances/{{ item.map_name }}.cfg"
    owner: "{{ ark_user }}"
    mode: '0644'
  loop: "{{ maps }}"

- name: Render default GameUserSettings.ini
  template:
    src: GameUserSettings.ini.j2
    dest: "{{ arkmanager_config_dir }}/files/{{ item.map_name }}/GameUserSettings.ini"
    owner: "{{ ark_user }}"
    mode: '0644'
  loop: "{{ maps }}"
  notify: restart map

# Per-map GameUserSettings.ini override (optional)
- name: Check for per-map GameUserSettings.ini override
  stat:
    path: "{{ user_config_dir | default(playbook_dir ~ '/config') }}/maps/{{ item.map_name }}/GameUserSettings.ini"
  loop: "{{ maps }}"
  register: gus_overrides

- name: Overlay per-map GameUserSettings.ini override
  copy:
    src: "{{ item.stat.path }}"
    dest: "{{ arkmanager_config_dir }}/files/{{ item.item.map_name }}/GameUserSettings.ini"
    owner: "{{ ark_user }}"
    mode: '0644'
  loop: "{{ gus_overrides.results }}"
  loop_control:
    label: "{{ item.item.map_name }}"
  when: item.stat.exists
  notify: restart map

- name: Render default Game.ini
  template:
    src: Game.ini.j2
    dest: "{{ arkmanager_config_dir }}/files/Game.ini"
    owner: "{{ ark_user }}"
    mode: '0644'
  notify: restart map

# Cluster-wide Game.ini override (optional)
- name: Check for Game.ini override
  stat:
    path: "{{ user_config_dir | default(playbook_dir ~ '/config') }}/Game.ini"
  register: game_override

- name: Overlay Game.ini override
  copy:
    src: "{{ game_override.stat.path }}"
    dest: "{{ arkmanager_config_dir }}/files/Game.ini"
    owner: "{{ ark_user }}"
    mode: '0644'
  when: game_override.stat.exists
  notify: restart map

- name: Create the ark admin file
  file:
    path: "{{ ark_server_root }}/ShooterGame/Saved/AllowedCheaterSteamIDs.txt"
    state: touch
    mode: '0644'

- name: Add SteamIDs for ark admins
  lineinfile:
    dest: "{{ ark_server_root }}/ShooterGame/Saved/AllowedCheaterSteamIDs.txt"
    line: '{{ item }}'
    state: present
  loop: "{{ admins }}"

- name: Install and update enabled mods
  command: arkmanager update --update-mods @{{ item.map_name }}
  loop: "{{ maps }}"
  notify: restart map
