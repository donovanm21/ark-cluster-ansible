---
- name: Check if arkmanager is installed
  command: which arkmanager
  register: arkmanager_installed
  changed_when: false
  failed_when: false

- name: Download the arkmanager netinstall script
  get_url:
    url: "{{ arkmanager_installer_url }}"
    dest: /tmp/arkmanager-netinstall.sh
    mode: '0755'
  when: arkmanager_installed.stdout == ''

- name: Run the arkmanager netinstall
  shell: "bash /tmp/arkmanager-netinstall.sh {{ ark_user }}"
  when: arkmanager_installed.stdout == ''

- name: Confirm arkmanager version
  command: arkmanager --version
  register: arkmanager_version
  changed_when: false
  failed_when: false

- name: Run 'arkmanager install' if steam/base tree is missing
  command: arkmanager install
  become: true
  become_user: "{{ ark_user }}"
  when:
    - arkmanager_version.stderr is defined
    - "'ERROR' in arkmanager_version.stderr"
